<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>行情看板</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Segoe UI', 'Arial', sans-serif;
            color: #e0e0e0;
            padding: 24px;
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 2em;
            font-weight: 600;
            color: #e0e0e0;
            letter-spacing: 0.05em;
        }

        .header .update-time {
            font-size: 0.85em;
            color: rgba(224, 224, 224, 0.5);
            margin-top: 6px;
        }

        .markets {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
        }

        .market-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        .market-card .card-title {
            font-size: 0.9em;
            color: rgba(224, 224, 224, 0.6);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .stock-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
        }

        .stock-item + .stock-item {
            border-top: 1px solid rgba(255, 255, 255, 0.04);
        }

        .stock-name {
            font-size: 0.95em;
            font-weight: 500;
            color: #e0e0e0;
        }

        .stock-right {
            text-align: right;
        }

        .stock-price {
            font-size: 1em;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

        .stock-change {
            font-size: 0.8em;
            margin-top: 2px;
        }

        .up { color: #e74c3c; }
        .down { color: #2ecc71; }

        @keyframes flashRed {
            0%   { background-color: rgba(231, 76, 60, 0.45); }
            60%  { background-color: rgba(231, 76, 60, 0.2); }
            100% { background-color: transparent; }
        }

        @keyframes flashGreen {
            0%   { background-color: rgba(46, 204, 113, 0.45); }
            60%  { background-color: rgba(46, 204, 113, 0.2); }
            100% { background-color: transparent; }
        }

        .flash-up {
            animation: flashRed 1.2s ease-out forwards;
            border-radius: 4px;
            padding: 0 6px;
        }

        .flash-down {
            animation: flashGreen 1.2s ease-out forwards;
            border-radius: 4px;
            padding: 0 6px;
        }

        .loading {
            text-align: center;
            color: rgba(224, 224, 224, 0.4);
            font-size: 0.85em;
            padding: 20px 0;
        }

        .error {
            text-align: center;
            color: #e67e22;
            font-size: 0.85em;
            padding: 10px 0;
        }

        @media (max-width: 600px) {
            body { padding: 16px; }
            .header h1 { font-size: 1.5em; }
            .markets { gap: 14px; }
            .market-card { padding: 16px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>行情看板</h1>
        <div class="update-time" id="updateTime">加载中...</div>
    </div>

    <div class="markets">
        <div class="market-card" id="ashares">
            <div class="card-title">A 股</div>
            <div class="loading">加载中...</div>
        </div>
        <div class="market-card" id="usstocks">
            <div class="card-title">美 股</div>
            <div class="loading">加载中...</div>
        </div>
        <div class="market-card" id="gold">
            <div class="card-title">黄 金</div>
            <div class="loading">加载中...</div>
        </div>
    </div>

    <script>
        const REFRESH_INTERVAL = 3000;
        const previousData = {};

        const marketData = {
            ashares: [
                { name: '上证指数', code: 'sh000001', price: 3234.56, change: 12.34, changePercent: 0.38 },
                { name: '深证成指', code: 'sz399001', price: 10234.78, change: -45.67, changePercent: -0.44 },
                { name: '创业板指', code: 'sz399006', price: 1987.65, change: 8.90, changePercent: 0.45 }
            ],
            usstocks: [
                { name: '道琼斯', code: 'gb_dji', price: 38456.78, change: 123.45, changePercent: 0.32 },
                { name: '纳斯达克', code: 'gb_ixic', price: 16234.56, change: -67.89, changePercent: -0.42 },
                { name: '标普500', code: 'gb_inx', price: 5234.12, change: 15.67, changePercent: 0.30 }
            ],
            gold: [
                { name: '现货黄金', code: 'hf_XAU', price: 2345.67, change: 8.90, changePercent: 0.38 },
                { name: '现货白银', code: 'hf_XAG', price: 27.89, change: -0.23, changePercent: -0.82 }
            ]
        };

        function formatPrice(price, decimals) {
            if (price === undefined || price === null || isNaN(price)) return '--';
            return price.toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
        }

        function formatChange(change, percent) {
            if (change === undefined || change === null || isNaN(change)) return '--';
            const sign = change >= 0 ? '+' : '';
            const p = percent !== undefined && !isNaN(percent) ? percent : 0;
            return `${sign}${change.toFixed(2)}  (${sign}${p.toFixed(2)}%)`;
        }

        function generateData(category) {
            const items = marketData[category];
            return items.map(item => {
                const oldPrice = item.price;
                const fluctuation = (Math.random() - 0.5) * 0.008;
                item.price = item.price * (1 + fluctuation);

                const priceDiff = item.price - oldPrice;
                item.change += priceDiff;

                const prevClose = item.price - item.change;
                item.changePercent = prevClose ? (item.change / prevClose) * 100 : 0;

                return { ...item };
            });
        }

        function renderItems(containerId, items, priceDecimals) {
            const container = document.getElementById(containerId);
            const title = container.querySelector('.card-title');
            if (!items || items.length === 0) {
                container.innerHTML = '';
                container.appendChild(title);
                const div = document.createElement('div');
                div.className = 'error';
                div.textContent = '数据暂不可用';
                container.appendChild(div);
                return;
            }
            container.innerHTML = '';
            container.appendChild(title);
            for (const item of items) {
                const key = item.code || item.name;
                const prev = previousData[key];
                const priceChanged = prev && item.price !== prev.price;
                const isUp = item.change >= 0;
                const cls = isUp ? 'up' : 'down';
                const flashCls = priceChanged
                    ? (item.price > prev.price ? 'flash-up' : 'flash-down')
                    : '';
                const div = document.createElement('div');
                div.className = 'stock-item';
                div.innerHTML = `
                    <span class="stock-name">${item.name}</span>
                    <div class="stock-right">
                        <div class="stock-price ${cls} ${flashCls}">${formatPrice(item.price, priceDecimals)}</div>
                        <div class="stock-change ${cls}">${formatChange(item.change, item.changePercent)}</div>
                    </div>
                `;
                container.appendChild(div);
                previousData[key] = { price: item.price };
            }
        }

        async function fetchMarket(category, containerId, priceDecimals) {
            const data = generateData(category);
            renderItems(containerId, data, priceDecimals);
        }

        async function refreshAll() {
            await Promise.all([
                fetchMarket('ashares', 'ashares', 2),
                fetchMarket('usstocks', 'usstocks', 2),
                fetchMarket('gold', 'gold', 2)
            ]);
            const now = new Date();
            document.getElementById('updateTime').textContent =
                `最后更新: ${now.toLocaleTimeString('zh-CN')}`;
        }

        refreshAll();
        setInterval(refreshAll, REFRESH_INTERVAL);
    </script>
</body>
</html>
